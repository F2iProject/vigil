name: "Vigil PR Review"
description: "AI-powered, model-agnostic PR review with multi-persona specialists and inline comments"
author: "F2iProject"

branding:
  icon: "eye"
  color: "purple"

inputs:
  pr-url:
    description: "PR URL to review (auto-detected from event context if omitted)"
    required: false
    default: ""
  command:
    description: "Command to run: review (default), dismiss-resolved, resolve-addressed"
    required: false
    default: "review"
  model:
    description: "LLM model for specialists (litellm format, e.g. gemini/gemini-2.5-flash)"
    required: false
    default: "gemini/gemini-2.5-flash"
  lead-model:
    description: "LLM model for lead reviewer (defaults to --model value)"
    required: false
    default: ""
  profile:
    description: "Review profile: default, enterprise"
    required: false
    default: "default"
  github-token:
    description: "GitHub token for posting reviews (defaults to GITHUB_TOKEN)"
    required: false
    default: ${{ github.token }}
  gemini-api-key:
    description: "Gemini API key (required if using gemini/* models)"
    required: false
  openai-api-key:
    description: "OpenAI API key (required if using openai/* models)"
    required: false
  anthropic-api-key:
    description: "Anthropic API key (required if using claude-* models)"
    required: false

runs:
  using: "composite"
  steps:
    # Resolve a usable Python 3.10+ interpreter. Prefer the system python3 on
    # self-hosted runners (Hetzner ci-general boxes ship with Python 3.12 and
    # the venv module), and fall back to actions/setup-python on GitHub-hosted
    # runners where the toolcache is reliable.
    - name: Detect Python
      id: py
      shell: bash
      run: |
        if command -v python3 >/dev/null 2>&1; then
          PY_VERSION="$(python3 -c 'import sys; print("%d.%d" % sys.version_info[:2])')"
          if python3 -c 'import sys; sys.exit(0 if sys.version_info >= (3, 10) else 1)'; then
            echo "Found system python3 $PY_VERSION — skipping setup-python"
            echo "python=$(command -v python3)" >> "$GITHUB_OUTPUT"
            echo "needs_setup=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        fi
        echo "No suitable system python3 — will run actions/setup-python"
        echo "needs_setup=true" >> "$GITHUB_OUTPUT"

    - name: Set up Python (fallback)
      if: steps.py.outputs.needs_setup == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Vigil into a venv
      id: install
      shell: bash
      run: |
        set -euo pipefail
        if [ "${{ steps.py.outputs.needs_setup }}" = "true" ]; then
          PYTHON_BIN="$(command -v python)"
        else
          PYTHON_BIN="${{ steps.py.outputs.python }}"
        fi
        VENV_DIR="${RUNNER_TEMP:-/tmp}/vigil-venv-${GITHUB_RUN_ID:-local}"
        rm -rf "$VENV_DIR"
        "$PYTHON_BIN" -m venv "$VENV_DIR"
        "$VENV_DIR/bin/pip" install --upgrade pip
        "$VENV_DIR/bin/pip" install "${{ github.action_path }}"
        echo "vigil=$VENV_DIR/bin/vigil" >> "$GITHUB_OUTPUT"

    - name: Run Vigil
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        set -euo pipefail
        VIGIL="${{ steps.install.outputs.vigil }}"
        PR_URL="${{ inputs.pr-url }}"
        if [ -z "$PR_URL" ]; then
          PR_URL="${{ github.event.pull_request.html_url }}"
        fi

        COMMAND="${{ inputs.command }}"

        if [ "$COMMAND" = "dismiss-resolved" ]; then
          "$VIGIL" dismiss-resolved "$PR_URL"
        elif [ "$COMMAND" = "resolve-addressed" ]; then
          "$VIGIL" resolve-addressed "$PR_URL"
        else
          ARGS=(
            "$PR_URL"
            --model "${{ inputs.model }}"
            --profile "${{ inputs.profile }}"
            --post
          )
          if [ -n "${{ inputs.lead-model }}" ]; then
            ARGS+=(--lead-model "${{ inputs.lead-model }}")
          fi
          "$VIGIL" review "${ARGS[@]}"
        fi
